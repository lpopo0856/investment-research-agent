name: Build UI executables

on:
  workflow_dispatch:
  push:
    tags:
      - "ui-v*"
  pull_request:
    paths:
      - "ui/**"
      - "scripts/**"
      - "requirements-ui*.txt"
      - ".github/workflows/build-ui-executables.yml"

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-ui.txt
            requirements-ui-dev.txt
            requirements-ui-build.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ui-dev.txt -r requirements-ui-build.txt

      - name: Verify account layout is safe for tests
        shell: bash
        run: python scripts/transactions.py account detect

      - name: Run UI tests
        run: python -m pytest ui/tests

      - name: Build executable
        run: python scripts/build_ui_executable.py

      - name: Resolve artifact path
        id: artifact
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "path=dist/investments-ui.exe" >> "$GITHUB_OUTPUT"
            echo "name=investments-ui-windows-x64.exe" >> "$GITHUB_OUTPUT"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "path=dist/investments-ui" >> "$GITHUB_OUTPUT"
            echo "name=investments-ui-macos" >> "$GITHUB_OUTPUT"
          else
            echo "path=dist/investments-ui" >> "$GITHUB_OUTPUT"
            echo "name=investments-ui-linux-x64" >> "$GITHUB_OUTPUT"
          fi

      - name: Confirm single executable exists
        shell: bash
        run: test -f "${{ steps.artifact.outputs.path }}"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
